# ARMORA API - Quarkus

quarkus.application.name=armora-api
quarkus.application.version=${APP_VERSION:0.1.0-SNAPSHOT}
app.version=${APP_VERSION:0.1.0-SNAPSHOT}
app.environment=${APP_ENV:local}

quarkus.http.host=${API_HOST:0.0.0.0}
quarkus.http.port=${API_PORT:8885}
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5775
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
quarkus.http.cors.headers=Content-Type,Authorization,Accept
quarkus.http.root-path=/

quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui
mp.openapi.extensions.smallrye.info.title=ARMORA Multimarkas API
mp.openapi.extensions.smallrye.info.version=${APP_VERSION:0.1.0-SNAPSHOT}
mp.openapi.extensions.smallrye.info.description=API REST versionada para ARMORA Multimarkas v2.

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DATABASE_USERNAME:${POSTGRES_USER:armora_user}}
quarkus.datasource.password=${DATABASE_PASSWORD:${POSTGRES_PASSWORD:armora123}}
quarkus.datasource.jdbc.url=${DATABASE_URL:jdbc:postgresql://localhost:5454/armora}
quarkus.datasource.jdbc.max-size=${DATABASE_MAX_SIZE:10}

quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

quarkus.redis.hosts=redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}

mp.jwt.verify.issuer=${JWT_ISSUER:armora-local}
mp.jwt.verify.publickey.location=/publickey.pem
smallrye.jwt.sign.key.location=/privatekey.pem
smallrye.jwt.new-token-lifespan=86400

quarkus.log.level=${LOG_LEVEL:INFO}
quarkus.http.access-log.enabled=${ENABLE_REQUEST_LOG:true}
quarkus.http.access-log.exclude-pattern=/q/health.*

seed.admin.username=${SEED_ADMIN_USERNAME:aanyarin}
seed.admin.password=${SEED_ADMIN_PASSWORD:aanyarin}

%test.app.environment=test
%test.quarkus.datasource.db-kind=postgresql
%test.quarkus.datasource.username=${TEST_DATABASE_USERNAME:armora_test}
%test.quarkus.datasource.password=${TEST_DATABASE_PASSWORD:armora_test_pass}
%test.quarkus.datasource.jdbc.url=${TEST_DATABASE_URL:jdbc:postgresql://localhost:5433/armora_test}
%test.quarkus.flyway.migrate-at-start=true
%test.quarkus.flyway.clean-at-start=true
%test.quarkus.flyway.validate-on-migrate=true
%test.quarkus.http.access-log.enabled=false
%test.quarkus.http.test-port=0
