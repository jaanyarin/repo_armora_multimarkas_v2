name: armora-multimarkas-v2

services:
  postgres:
    image: postgres:16-alpine
    container_name: armora-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-armora}
      POSTGRES_USER: ${POSTGRES_USER:-armora_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required. Copy .env.example to .env.local and set a local-only password.}
      TZ: ${APP_TIMEZONE:-America/Lima}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - armora_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - armora_local

  redis:
    image: redis:7-alpine
    container_name: armora-redis-local
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - armora_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - armora_local

volumes:
  armora_postgres_data:
  armora_redis_data:

networks:
  armora_local:
    driver: bridge
