# =============================================================================
# Nginx Configuration — ARMORA Multimarkas v2 (Producción)
# =============================================================================
# Uso:
#   1. Copiar a /etc/nginx/nginx.conf (o incluir desde sites-available/)
#   2. Reemplazar armorasac.com por el dominio real
#   3. Certificar con Let's Encrypt / Certbot
#   4. Configurar variables donde corresponda
# =============================================================================

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ── Limits ──────────────────────────────────────────────────────────────
    client_max_body_size       10M;
    keepalive_timeout          65;

    # ── Logs ────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;
    error_log   /var/log/nginx/error.log   warn;

    # ── Compression ─────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
              image/svg+xml text/xml application/xml;

    # ── Upstreams ───────────────────────────────────────────────────────────
    upstream api_backend {
        server api:8885;            # desde docker-compose → container api
    }

    upstream admin_frontend {
        server admin-web:5775;      # desde docker-compose → container admin-web
    }

    # ═══════════════════════════════════════════════════════════════════════
    # Server HTTP → redirige a HTTPS
    # ═══════════════════════════════════════════════════════════════════════
    server {
        listen      80;
        listen [::]:80;
        server_name armorasac.com admin.armorasac.com api.armorasac.com;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ═══════════════════════════════════════════════════════════════════════
    # Server HTTPS — Admin Web (admin.armorasac.com)
    # ═══════════════════════════════════════════════════════════════════════
    server {
        listen      443 ssl http2;
        listen [::]:443 ssl http2;
        server_name admin.armorasac.com;

        ssl_certificate     /etc/letsencrypt/live/admin.armorasac.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/admin.armorasac.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # ── Admin Web (Next.js) ──────────────────────────────────────────
        location / {
            proxy_pass  http://admin_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (necesario para Next.js dev, opcional en prod)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── API ──────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass  http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Fotos estáticas ──────────────────────────────────────────────
        location /files/photos/ {
            alias /var/www/armora/uploads/photos/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options nosniff;

            # Denegar acceso a archivos ocultos (punto)
            location ~ /\. {
                deny all;
                return 404;
            }
        }

        # ── OpenAPI / Swagger UI ─────────────────────────────────────────
        location /q/ {
            proxy_pass  http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Restringir Swagger UI en producción
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny  all;
        }

        # ── Seguridad extra ──────────────────────────────────────────────
        location = /robots.txt {
            return 200 "User-agent: *\nDisallow: /\n";
        }

        location ~ /\. {
            deny all;
            return 404;
        }

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # ═══════════════════════════════════════════════════════════════════════
    # Server HTTPS — API directa (api.armorasac.com)
    # ═══════════════════════════════════════════════════════════════════════
    # Opcional: solo si quieres exponer la API como subdominio separado.
    # Si usas admin.armorasac.com/api/ esto no es necesario.
    #
    # server {
    #     listen      443 ssl http2;
    #     listen [::]:443 ssl http2;
    #     server_name api.armorasac.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/api.armorasac.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/api.armorasac.com/privkey.pem;
    #
    #     location / {
    #         proxy_pass http://api_backend;
    #     }
    #
    #     location /files/photos/ {
    #         alias /var/www/armora/uploads/photos/;
    #         expires 30d;
    #     }
    # }
}
