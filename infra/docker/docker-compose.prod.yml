# =============================================================================
# Docker Compose — ARMORA Multimarkas v2 (Producción)
# =============================================================================
# Uso:
#   docker compose -f infra/docker/docker-compose.prod.yml up -d
# =============================================================================

name: armora-multimarkas-v2

services:
  # ── Base de datos ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: armora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: America/Lima
    ports:
      - "127.0.0.1:5432:5432"     # solo acceso local para backups
    volumes:
      - armora_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - armora_internal

  # ── Cache / Colas ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: armora-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"     # solo acceso local
    volumes:
      - armora_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - armora_internal

  # ── API Backend (Quarkus) ─────────────────────────────────────────────────
  api:
    build:
      context: ../../backend/api-quarkus
      dockerfile: ../../infra/docker/Dockerfile.api
    container_name: armora-api
    restart: unless-stopped
    environment:
      APP_ENV: production
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      QUARKUS_DATASOURCE_USERNAME: ${POSTGRES_USER}
      QUARKUS_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      QUARKUS_REDIS_HOSTS: redis://:${REDIS_PASSWORD}@redis:6379
      QUARKUS_HTTP_BODY_UPLOADS_DIRECTORY: /uploads/photos
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_SECRET_PATH: /run/secrets/jwt_secret
    volumes:
      - armora_uploads:/uploads
    secrets:
      - jwt_secret
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - armora_internal

  # ── Admin Web (Next.js) ───────────────────────────────────────────────────
  admin-web:
    build:
      context: ../../frontend_web
      dockerfile: ../../infra/docker/Dockerfile.admin-web
    container_name: armora-admin-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: https://admin.armorasac.com/api/v1
      # O si usas Nginx para proxy:
      # NEXT_PUBLIC_API_BASE_URL: /api/v1
    networks:
      - armora_internal

  # ── Reverse Proxy (Nginx) ────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: armora-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro     # certificados SSL
      - armora_uploads:/var/www/armora/uploads/photos:ro
    depends_on:
      - api
      - admin-web
    networks:
      - armora_internal

  # ── Worker (jobs asíncronos: SUNAT, emails, backup) ──────────────────────
  # En Fase 1 solo referencia estructural. Se activa cuando haya colas.
  # worker:
  #   build:
  #     context: ../../backend/api-quarkus
  #     dockerfile: ../../infra/docker/Dockerfile.worker
  #   container_name: armora-worker
  #   restart: unless-stopped
  #   environment:
  #     APP_ENV: production
  #     ...
  #   networks:
  #     - armora_internal

volumes:
  armora_postgres_data:
    driver: local
  armora_redis_data:
    driver: local
  armora_uploads:
    driver: local

secrets:
  jwt_secret:
    file: ./secrets/jwt_secret.txt   # crear manualmente, fuera del repo

networks:
  armora_internal:
    driver: bridge
